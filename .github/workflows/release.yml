name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      matrix:
        os: [macos-14, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release bundle
        run: pnpm bundle

      - name: Zip macOS app bundle
        if: matrix.os == 'macos-14'
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            src-tauri/target/release/bundle/macos/PPaste.app \
            src-tauri/target/release/bundle/macos/PPaste.app.zip

      - name: Normalize Windows artifact names
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts/windows | Out-Null
          Get-ChildItem src-tauri/target/release/bundle/msi/*.msi -ErrorAction SilentlyContinue | ForEach-Object {
            $normalized = $_.Name -replace '_[a-z]{2}-[A-Z]{2}\.msi$', '.msi'
            Copy-Item $_.FullName -Destination (Join-Path 'release-artifacts/windows' $normalized) -Force
          }
          Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName -Destination (Join-Path 'release-artifacts/windows' $_.Name) -Force
          }

      - name: Collect release files
        id: release-files
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "macos-14" ]]; then
            {
              echo "files<<EOF"
              echo "src-tauri/target/release/bundle/macos/PPaste.app.zip"
              echo "src-tauri/target/release/bundle/dmg/PPaste_*.dmg"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "files<<EOF"
              echo "release-artifacts/windows/*.msi"
              echo "release-artifacts/windows/*.exe"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            Release ${{ github.ref_name }}
          files: ${{ steps.release-files.outputs.files }}
