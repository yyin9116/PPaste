name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      matrix:
        os: [macos-14, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release bundle
        run: pnpm bundle

      - name: Zip macOS app bundle
        if: matrix.os == 'macos-14'
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            src-tauri/target/release/bundle/macos/PPaste.app \
            src-tauri/target/release/bundle/macos/PPaste.app.zip

      - name: Normalize macOS artifact names
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release-artifacts/macos
          cp "src-tauri/target/release/bundle/macos/PPaste.app.zip" "release-artifacts/macos/ppaste-${VERSION}-macos-aarch64.zip"
          DMG_FILE=$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -n 1)
          cp "$DMG_FILE" "release-artifacts/macos/ppaste-${VERSION}-macos-aarch64.dmg"

      - name: Normalize Windows artifact names
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          New-Item -ItemType Directory -Force -Path release-artifacts/windows | Out-Null

          $msi = Get-ChildItem src-tauri/target/release/bundle/msi/*.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($msi) {
            Copy-Item $msi.FullName -Destination (Join-Path 'release-artifacts/windows' "ppaste-$version-windows-x64.msi") -Force
          }

          $exe = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($exe) {
            Copy-Item $exe.FullName -Destination (Join-Path 'release-artifacts/windows' "ppaste-$version-windows-x64.exe") -Force
          }

      - name: Collect release files
        id: release-files
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "macos-14" ]]; then
            {
              echo "files<<EOF"
              echo "release-artifacts/macos/*.zip"
              echo "release-artifacts/macos/*.dmg"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "files<<EOF"
              echo "release-artifacts/windows/*.msi"
              echo "release-artifacts/windows/*.exe"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Read tag message (macOS)
        if: matrix.os == 'macos-14'
        id: tag-message-macos
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          # 提取“带注释的 tag 注释内容”（不是 commit message）
          # git cat-file -p 输出为 tag 对象，消息从第一段空行后开始
          BODY="$(git cat-file -p "$TAG" | awk 'BEGIN{found=0} { if(found){print} else if($0==""){found=1} }')"
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Read tag message (Windows)
        if: matrix.os == 'windows-latest'
        id: tag-message-windows
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $raw = git cat-file -p $tag
          $lines = $raw -split "\r?\n"

          # 找到 tag 对象里“第一段空行”后的消息
          $idx = 0
          while ($idx -lt $lines.Length -and $lines[$idx] -ne "") { $idx++ }

          if ($idx -ge $lines.Length) {
            $body = ""
          } else {
            $bodyLines = @()
            for ($i = $idx + 1; $i -lt $lines.Length; $i++) {
              $bodyLines += $lines[$i]
            }
            $body = ($bodyLines -join "`n").TrimEnd()
          }

          Add-Content -Path $env:GITHUB_OUTPUT -Value "body<<EOF"
          Add-Content -Path $env:GITHUB_OUTPUT -Value $body
          Add-Content -Path $env:GITHUB_OUTPUT -Value "EOF"

      - name: Create GitHub release (macOS)
        if: matrix.os == 'macos-14'
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.tag-message-macos.outputs.body }}
          files: ${{ steps.release-files.outputs.files }}

      - name: Create GitHub release (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.tag-message-windows.outputs.body }}
          files: ${{ steps.release-files.outputs.files }}