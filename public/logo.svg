<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <linearGradient id="frontGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>
    <linearGradient id="midGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4D4D8" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#A1A1AA" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="backGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A1A1AA" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#71717A" stop-opacity="0.05" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect x="8" y="8" width="112" height="112" rx="28" fill="#FFFFFF" fill-opacity="0.96" />

  <!-- Back Card -->
  <rect x="56" y="20" width="48" height="64" rx="12" fill="url(#backGrad)" stroke="#71717A" stroke-width="1.5" stroke-opacity="0.4" />

  <!-- Middle Card -->
  <rect x="40" y="36" width="48" height="64" rx="12" fill="url(#midGrad)" stroke="#A1A1AA" stroke-width="1.5" stroke-opacity="0.5" filter="url(#shadow)" />

  <!-- Front Card -->
  <rect x="24" y="52" width="48" height="64" rx="12" fill="url(#frontGrad)" filter="url(#shadow)" />

  <!-- Lines on Front Card -->
  <rect x="34" y="66" width="28" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.95" />
  <rect x="34" y="78" width="20" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.7" />
  <rect x="34" y="90" width="14" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.4" />

  <!-- Sparkle / Space Element -->
  <path d="M96 16 C96 22 100 26 106 26 C100 26 96 30 96 36 C96 30 92 26 86 26 C92 26 96 22 96 16 Z" fill="#38BDF8" filter="url(#glow)" />
  
  <!-- Small Sparkle -->
  <path d="M24 24 C24 27 26 29 29 29 C26 29 24 31 24 34 C24 31 22 29 19 29 C22 29 24 27 24 24 Z" fill="#818CF8" fill-opacity="0.8" />
</svg>
